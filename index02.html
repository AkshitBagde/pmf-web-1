<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMF — Crack Your APM Placement</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --navy:#0B1120; --navy2:#131d30; --cream:#F7F3EC; --cream2:#EDE8DF;
  --gold:#D4A843; --gold2:#F0C96A; --coral:#E8573A; --sky:#4A8FD4;
  --muted:#8A8E9A; --rule:#D6D0C6; --glow:rgba(212,168,67,0.18);
  --shadow-sm:0 2px 12px rgba(11,17,32,0.10); --shadow-md:0 8px 32px rgba(11,17,32,0.14); --shadow-lg:0 20px 60px rgba(11,17,32,0.20);
  --radius:4px; --t:0.28s cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--navy);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.65;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");opacity:0.6;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 var(--glow);}50%{box-shadow:0 0 28px 4px var(--glow);}}
@keyframes shimmer{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
.fade-up{opacity:0;transform:translateY(28px);transition:opacity 0.75s cubic-bezier(0.16,1,0.3,1),transform 0.75s cubic-bezier(0.16,1,0.3,1);}
.fade-up.visible{opacity:1;transform:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--cream2);}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
::selection{background:var(--gold);color:var(--navy);}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:18px 52px;background:rgba(247,243,236,0.88);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(11,17,32,0.08);box-shadow:0 1px 0 rgba(212,168,67,0.12),var(--shadow-sm);transition:padding var(--t),background var(--t),box-shadow var(--t);}
nav.scrolled{padding:11px 52px;background:rgba(247,243,236,0.97);box-shadow:var(--shadow-md);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.1em;color:var(--navy);text-decoration:none;}
.nav-logo span{color:var(--gold);text-shadow:0 0 20px rgba(212,168,67,0.4);}
.nav-links{display:flex;gap:28px;list-style:none;align-items:center;}
.nav-links a{text-decoration:none;color:var(--navy);font-size:0.76rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;position:relative;padding-bottom:2px;transition:color var(--t);}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--gold);transition:width var(--t);}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::after{width:100%;}
.nav-price{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);letter-spacing:0.08em;}
.nav-cta{background:var(--navy) !important;color:var(--cream) !important;padding:9px 22px !important;font-size:0.74rem !important;border-radius:var(--radius);transition:all var(--t) !important;border:1.5px solid var(--navy) !important;}
.nav-cta:hover{background:var(--gold) !important;color:var(--navy) !important;border-color:var(--gold) !important;transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,67,0.35) !important;}
.nav-cta::after{display:none !important;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;transition:all 0.3s;}
.mobile-menu{display:none;position:fixed;inset:0;background:var(--navy);z-index:199;flex-direction:column;justify-content:center;align-items:center;gap:24px;}
.mobile-menu.open{display:flex;animation:fadeIn 0.3s ease;}
.mobile-menu a{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.12em;color:var(--cream);text-decoration:none;transition:color 0.2s;}
.mobile-menu a:hover{color:var(--gold);}
.mobile-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--cream);font-size:1.8rem;cursor:pointer;opacity:0.7;}
.hero{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);border-bottom:1px solid rgba(212,168,67,0.2);position:relative;overflow:hidden;}
.hero-canvas{position:absolute;inset:0;z-index:0;}
.hero-content{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:28px;}
.hero-monogram{font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,18vw,220px);line-height:1;letter-spacing:0.08em;color:transparent;-webkit-text-stroke:2px rgba(212,168,67,0.8);animation:fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;user-select:none;}
.hero-monogram span{color:var(--gold);-webkit-text-stroke:0;text-shadow:0 0 80px rgba(212,168,67,0.5);}
.hero-fullform{font-family:'DM Sans',sans-serif;font-size:clamp(0.6rem,1.2vw,0.78rem);font-weight:600;letter-spacing:0.36em;text-transform:uppercase;color:rgba(212,168,67,0.55);animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.15s both;margin-top:-16px;}
.hero-rule{width:48px;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
.hero-tagline{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(1rem,2vw,1.3rem);color:rgba(247,243,236,0.75);letter-spacing:0.1em;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;}
.hero-cta-group{display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.45s both;}
.hero-scroll{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:1;opacity:0.4;}
.hero-scroll span{font-size:0.55rem;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--cream);}
.hero-scroll-bar{width:1px;height:36px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollDrop 2s ease-in-out infinite;}
@keyframes scrollDrop{0%{transform:scaleY(0);transform-origin:top;opacity:1;}50%{transform:scaleY(1);transform-origin:top;}51%{transform-origin:bottom;}100%{transform:scaleY(0);transform-origin:bottom;opacity:0;}}
.btn-primary{background:var(--gold);color:var(--navy);padding:15px 36px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;text-decoration:none;display:inline-block;border-radius:var(--radius);position:relative;overflow:hidden;transition:transform var(--t),box-shadow var(--t);box-shadow:0 4px 20px rgba(212,168,67,0.4);}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.28) 50%,transparent 70%);transform:translateX(-100%);transition:transform 0.5s ease;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(212,168,67,0.5);}
.btn-primary:hover::before{transform:translateX(100%);}
.btn-ghost{color:var(--navy);font-size:0.8rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--rule);padding-bottom:2px;transition:gap var(--t),border-color var(--t),color var(--t);}
.btn-ghost:hover{gap:14px;color:var(--gold);border-color:var(--gold);}
.hero-right{position:relative;z-index:1;animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s both;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;border-radius:8px;overflow:hidden;border:1px solid var(--rule);box-shadow:var(--shadow-lg);}
.stat-box{background:var(--cream);padding:36px 28px;transition:all var(--t);cursor:default;}
.stat-box:hover{background:var(--navy);transform:scale(1.04);box-shadow:var(--shadow-md);z-index:1;position:relative;}
.stat-box:hover .stat-num{color:var(--cream);}
.stat-box:hover .stat-num span{color:var(--gold2);}
.stat-box:hover .stat-label{color:var(--muted);}
.stat-box.dark{background:var(--navy);}
.stat-box.dark .stat-num{color:var(--cream);}
.stat-box.dark .stat-label{color:var(--muted);}
.stat-box.dark:hover{background:var(--gold);}
.stat-box.dark:hover .stat-num,.stat-box.dark:hover .stat-label{color:var(--navy);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:var(--navy);margin-bottom:6px;}
.stat-num span{color:var(--gold);}
.stat-label{font-size:0.68rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);}
.marquee-wrap{background:var(--navy);padding:13px 0;overflow:hidden;white-space:nowrap;border-top:1px solid rgba(212,168,67,0.18);border-bottom:1px solid rgba(212,168,67,0.18);position:relative;}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none;}
.marquee-wrap::before{left:0;background:linear-gradient(to right,var(--navy),transparent);}
.marquee-wrap::after{right:0;background:linear-gradient(to left,var(--navy),transparent);}
.marquee-track{display:inline-block;animation:marquee 32s linear infinite;}
.marquee-track span{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.14em;color:rgba(247,243,236,0.7);margin:0 28px;}
.marquee-track .dot{color:var(--gold);margin:0;}
section{padding:100px 52px;border-bottom:1px solid var(--rule);}
.section-label{font-size:0.68rem;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:inline-flex;align-items:center;gap:10px;}
.section-label::before{content:'';display:block;width:24px;height:2px;background:var(--gold);border-radius:1px;}
h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,5.5vw,72px);line-height:0.95;letter-spacing:0.02em;margin-bottom:16px;color:var(--navy);}
h2 em{font-style:italic;font-family:'DM Serif Display',serif;color:var(--gold);}
.section-intro{max-width:600px;color:var(--muted);font-size:1rem;font-weight:300;line-height:1.8;margin-bottom:52px;}
.section-intro strong{color:var(--navy);font-weight:600;}
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:8px;overflow:hidden;margin-top:52px;box-shadow:var(--shadow-sm);}
.pillar{background:var(--cream);padding:44px 28px;transition:all var(--t);cursor:default;position:relative;overflow:hidden;}
.pillar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transform:scaleX(0);transform-origin:left;transition:transform var(--t);}
.pillar:hover{background:var(--navy);transform:translateY(-6px);box-shadow:var(--shadow-md);z-index:1;}
.pillar:hover::after{transform:scaleX(1);}
.pillar:hover .pillar-icon,.pillar:hover .pillar-title,.pillar:hover .pillar-desc{color:var(--cream);}
.pillar:hover .pillar-icon{color:var(--gold);}
.pillar-icon{font-size:2rem;margin-bottom:20px;display:block;transition:color var(--t);}
.pillar-title{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:10px;color:var(--navy);transition:color var(--t);}
.pillar-desc{font-size:0.81rem;color:var(--muted);line-height:1.7;transition:color var(--t);}
.topics-list{margin-top:52px;border:1px solid var(--rule);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm);}
.topic-row{display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:24px;padding:20px 28px;border-bottom:1px solid var(--rule);background:var(--cream);transition:background var(--t);cursor:default;}
.topic-row:last-child{border-bottom:none;}
.topic-row:hover{background:linear-gradient(90deg,rgba(212,168,67,0.08),transparent);}
.topic-num{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1;color:var(--rule);transition:color var(--t);}
.topic-row:hover .topic-num{color:var(--gold);}
.topic-name{font-weight:600;font-size:0.92rem;color:var(--navy);margin-bottom:3px;}
.topic-desc{font-size:0.77rem;color:var(--muted);line-height:1.55;}
.week-badge{display:inline-block;font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:4px 12px;white-space:nowrap;border-radius:2px;color:white;}
.week-badge.w1{background:var(--coral);}
.week-badge.w2{background:var(--sky);}
.week-badge.w3{background:#2D8A60;}
.week-badge.w45{background:#7C50C4;}
.weeks-grid{display:flex;flex-direction:column;margin-top:52px;gap:8px;}
.week-row{display:grid;grid-template-columns:140px 1fr 1fr;background:var(--cream);border:1px solid var(--rule);border-radius:6px;overflow:hidden;transition:box-shadow var(--t);}
.week-row:hover{box-shadow:var(--shadow-md);z-index:1;}
.week-label{background:var(--navy);padding:28px 20px;display:flex;flex-direction:column;justify-content:center;gap:4px;border-right:1px solid rgba(212,168,67,0.15);}
.week-label .wnum{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;color:var(--gold);text-shadow:0 0 20px rgba(212,168,67,0.3);}
.week-label .wtag{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
.week-day{padding:22px 26px;border-right:1px solid var(--rule);background:var(--cream);transition:background var(--t);}
.week-day:last-child{border-right:none;}
.week-row:hover .week-day{background:rgba(212,168,67,0.04);}
.day-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.day-name{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:0.08em;color:var(--navy);}
.day-format{font-size:0.58rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;padding:3px 9px;border-radius:2px;background:var(--rule);color:var(--muted);}
.day-format.live{background:var(--coral);color:white;}
.day-format.mock{background:var(--sky);color:white;}
.day-format.mock1{background:#7C50C4;color:white;}
.day-topic{font-size:0.84rem;color:var(--navy);font-weight:600;margin-bottom:4px;}
.day-detail{font-size:0.75rem;color:var(--muted);line-height:1.55;}
.instructor-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:52px;}
.instructor-card{background:var(--cream2);padding:48px 40px;border-radius:8px;border:1px solid var(--rule);transition:all var(--t);position:relative;overflow:hidden;}
.instructor-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));background-size:200% auto;animation:shimmer 3s linear infinite;}
.instructor-card:hover{background:var(--cream);transform:translateY(-6px);box-shadow:var(--shadow-lg);}
.instructor-letter{font-family:'Bebas Neue',sans-serif;font-size:6rem;line-height:1;color:var(--rule);margin-bottom:8px;transition:color var(--t);}
.instructor-card:hover .instructor-letter{color:var(--gold);}
.instructor-role{font-size:0.66rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--sky);margin-bottom:16px;}
.instructor-desc{font-size:0.84rem;color:var(--muted);line-height:1.75;}
.pricing-card{margin-top:52px;display:grid;grid-template-columns:1fr 1.4fr;border:1px solid var(--rule);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-lg);}
.price-left{padding:56px 44px;background:var(--navy);position:relative;overflow:hidden;}
.price-left::after{content:'₹';position:absolute;bottom:-20px;right:-10px;font-family:'Bebas Neue',sans-serif;font-size:200px;line-height:1;color:rgba(255,255,255,0.03);pointer-events:none;user-select:none;}
.price-label{font-size:0.66rem;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.price-amount{font-family:'Bebas Neue',sans-serif;font-size:7rem;line-height:0.88;color:var(--gold);margin-bottom:8px;text-shadow:0 0 40px rgba(212,168,67,0.4);}
.price-per{font-size:0.75rem;color:#4a5060;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px;}
.price-spots{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);padding:10px 16px;border-radius:var(--radius);margin-bottom:32px;border:1px solid rgba(212,168,67,0.2);}
.price-spots .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
.price-spots span{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.price-spots strong{color:var(--cream);}
.price-right{padding:56px 44px;background:var(--cream);}
.price-includes-title{font-size:0.66rem;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;}
.price-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--rule);}
.price-item:last-child{border-bottom:none;}
.price-item-icon{color:var(--gold);font-size:0.85rem;margin-top:3px;flex-shrink:0;}
.price-item-text{font-size:0.87rem;color:var(--navy);line-height:1.5;font-weight:500;}
.price-item-text span{font-size:0.74rem;color:var(--muted);display:block;margin-top:2px;font-weight:300;}
.cta-section{background:var(--navy);color:var(--cream);padding:112px 52px;text-align:center;position:relative;overflow:hidden;}
.cta-orb1{position:absolute;top:-120px;left:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(212,168,67,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.cta-orb2{position:absolute;bottom:-80px;right:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(74,143,212,0.10) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.cta-bg-word{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:40vw;line-height:1;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.03);letter-spacing:-0.05em;user-select:none;pointer-events:none;}
.cta-section h2{color:var(--cream);position:relative;z-index:1;margin-bottom:14px;}
.cta-price{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;color:var(--gold);position:relative;z-index:1;margin-bottom:12px;letter-spacing:0.04em;text-shadow:0 0 30px rgba(212,168,67,0.4);}
.cta-sub{color:rgba(247,243,236,0.5);position:relative;z-index:1;margin-bottom:44px;font-size:1rem;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;}
.cta-form{position:relative;z-index:1;display:flex;max-width:460px;margin:0 auto 24px;border-radius:var(--radius);overflow:hidden;box-shadow:0 0 0 1px rgba(212,168,67,0.3),var(--shadow-md);}
.cta-form input{flex:1;background:rgba(255,255,255,0.07);border:none;color:var(--cream);padding:16px 20px;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:background var(--t);}
.cta-form input::placeholder{color:rgba(247,243,236,0.3);}
.cta-form input:focus{background:rgba(255,255,255,0.11);}
.cta-form button{background:var(--gold);color:var(--navy);border:none;padding:16px 28px;font-family:'DM Sans',sans-serif;font-size:0.77rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:all var(--t);white-space:nowrap;}
.cta-form button:hover{background:var(--gold2);box-shadow:0 0 20px rgba(212,168,67,0.4);}
.cta-form button:disabled{background:var(--sky);cursor:default;}
.cta-note{position:relative;z-index:1;font-size:0.7rem;color:rgba(247,243,236,0.22);letter-spacing:0.08em;margin-top:14px;}
footer{background:var(--navy);padding:40px 52px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(212,168,67,0.15);}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.1em;color:var(--cream);}
.footer-logo span{color:var(--gold);text-shadow:0 0 16px rgba(212,168,67,0.5);}
.footer-copy{font-size:0.72rem;color:var(--muted);}
@media(max-width:900px){
  nav{padding:14px 20px;}.nav-links{display:none;}.hamburger{display:flex;}
  .hero{grid-template-columns:1fr;padding:108px 20px 60px;gap:40px;}.hero-right{display:none;}
  .hero-bg-text{font-size:30vw;bottom:-20px;}
  section{padding:64px 20px;}
  .pillars{grid-template-columns:1fr 1fr;}
  .pillar{border-bottom:1px solid var(--rule);}
  .pillar:nth-child(even){border-right:none;}
  .pillar:hover{transform:none;}
  .topic-row{grid-template-columns:40px 1fr;}
  .topic-row .week-badge{display:none;}
  .week-row{grid-template-columns:1fr;}
  .week-label{flex-direction:row;align-items:center;gap:12px;padding:16px 20px;}
  .week-label .wnum{font-size:2rem;}
  .week-day{border-right:none;border-bottom:1px solid var(--rule);padding:16px 20px;}
  .week-day:last-child{border-bottom:none;}
  .instructor-grid{grid-template-columns:1fr;gap:16px;}
  .instructor-card{padding:32px 24px;}.instructor-card:hover{transform:none;}
  .pricing-card{grid-template-columns:1fr;}
  .price-left{padding:36px 24px;}.price-right{padding:36px 24px;}
  .price-amount{font-size:5.5rem;}
  .cta-section{padding:80px 20px;}
  .cta-form{flex-direction:column;}
  footer{flex-direction:column;gap:12px;text-align:center;padding:28px 20px;}
}
@media(max-width:540px){
  h1{font-size:52px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pillars{grid-template-columns:1fr;}
  .pillar{border-right:none;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
function useVisible(){const ref=useRef(null);const[v,setV]=useState(false);useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);obs.disconnect();}},{threshold:0.07});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[]);return[ref,v];}
function FadeUp({children,delay=0}){const[ref,v]=useVisible();return<div ref={ref} className={`fade-up ${v?'visible':''}`} style={{transitionDelay:`${delay}s`}}>{children}</div>;}
function Nav(){const[scrolled,setScrolled]=useState(false);const[open,setOpen]=useState(false);useEffect(()=>{const h=()=>setScrolled(window.scrollY>40);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);},[]);const links=[{href:'#topics',label:'Topics'},{href:'#schedule',label:'Schedule'},{href:'#pricing',label:'Pricing'}];return(<><nav className={scrolled?'scrolled':''}><a href="#" className="nav-logo">PM<span>F</span></a><ul className="nav-links">{links.map(l=><li key={l.href}><a href={l.href}>{l.label}</a></li>)}<li className="nav-price">₹5,999</li><li><a href="#enroll" className="nav-cta">Enroll Now</a></li></ul><button className="hamburger" onClick={()=>setOpen(true)}><span/><span/><span/></button></nav><div className={`mobile-menu ${open?'open':''}`}><button className="mobile-close" onClick={()=>setOpen(false)}>✕</button>{links.map(l=><a key={l.href} href={l.href} onClick={()=>setOpen(false)}>{l.label}</a>)}<a href="#enroll" onClick={()=>setOpen(false)} style={{color:'var(--gold)'}}>Enroll — ₹5,999</a></div></>);}
function Hero(){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    let W=canvas.width=canvas.offsetWidth;
    let H=canvas.height=canvas.offsetHeight;
    let t=0;
    const waves=[
      {amp:60,freq:0.012,speed:0.018,y:0.3,col:'212,168,67',  lw:1.5,op:0.5},
      {amp:45,freq:0.010,speed:0.013,y:0.45,col:'74,143,212', lw:1.2,op:0.4},
      {amp:70,freq:0.009,speed:0.010,y:0.55,col:'124,80,196', lw:1.0,op:0.3},
      {amp:40,freq:0.014,speed:0.020,y:0.65,col:'45,138,96',  lw:1.2,op:0.35},
      {amp:55,freq:0.011,speed:0.015,y:0.38,col:'212,168,67', lw:0.8,op:0.25},
      {amp:35,freq:0.016,speed:0.022,y:0.72,col:'74,143,212', lw:0.9,op:0.2},
    ];
        function draw(){
      ctx.clearRect(0,0,W,H);
      waves.forEach(w=>{
        ctx.beginPath();
        for(let x=0;x<=W;x+=2){
          const y=H*w.y + Math.sin(x*w.freq + t*w.speed)*w.amp
                        + Math.sin(x*w.freq*1.7 + t*w.speed*0.6)*w.amp*0.4;
          x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.strokeStyle=`rgba(${w.col},${w.op})`;
        ctx.lineWidth=w.lw;
        ctx.stroke();
      });
      t++;
      requestAnimationFrame(draw);
    }
    draw();
    const resize=()=>{W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;};
    window.addEventListener('resize',resize);
    return()=>window.removeEventListener('resize',resize);
  },[]);
  return(
    <section className="hero">
      <canvas ref={canvasRef} className="hero-canvas" style={{width:'100%',height:'100%'}}/>
      <div className="hero-content">
        <div className="hero-monogram">PM<span>F</span></div>
        <div className="hero-fullform">Product · Manager · Fit</div>
        <div className="hero-rule"/>
        <div className="hero-tagline">Crack your PM placement.</div>
        <div className="hero-cta-group">
          <a href="#enroll" className="btn-primary">Reserve Your Seat</a>
          <a href="#topics" className="btn-ghost" style={{color:'rgba(247,243,236,0.85)',borderColor:'rgba(247,243,236,0.5)'}}>Explore Program →</a>
        </div>
      </div>
      <div className="hero-scroll">
        <div className="hero-scroll-bar"/>
        <span>Scroll</span>
      </div>
    </section>
  );
}
function Marquee(){const items=['Guesstimates','Product Design','Root Cause Analysis','PM Assignments','Resume Masterclass','1:1 Mock Interviews','Peer Mock Rounds','Interview Formats'];return(<div className="marquee-wrap"><div className="marquee-track">{[...items,...items].map((t,i)=><React.Fragment key={i}><span>{t}</span><span className="dot">✦</span></React.Fragment>)}</div></div>);}
function WhatYouGet(){const pillars=[{icon:'📖',title:'Live Classes',desc:'PM cases including guesstimates, product design, RCA, assignments and resume taught live.'},{icon:'🔁',title:'Mock Interviews',desc:'Breakout groups with live mocks with peers'},{icon:'🎯',title:'1:1 Mock Interview',desc:'1 hour with an instructor. Full mock in your chosen format, followed by deep personalised feedback.'},{icon:'📄',title:'Resume Review',desc:'Line-by-line PM-lens feedback included with your 1:1 slot. Impact framing and rewrite guidance.'}];return(<section><div className="section-label">What's Included</div><h2>Built Around<br/><em>Real Interviews</em></h2><FadeUp><div className="pillars">{pillars.map((p,i)=><div key={i} className="pillar"><span className="pillar-icon">{p.icon}</span><div className="pillar-title">{p.title}</div><p className="pillar-desc">{p.desc}</p></div>)}</div></FadeUp></section>);}
function Topics(){const topics=[{num:'1',name:'PM Cases & Interview Formats',week:'Week 1',wc:'w1',desc:'What PM interviews exist, how panels evaluate, how to structure answers from day one.'},{num:'2',name:'Guesstimates',week:'Week 1',wc:'w1',desc:'Estimation frameworks, thinking aloud, avoiding traps, structuring numbers confidently.'},{num:'3',name:'Product Design',week:'Week 2',wc:'w2',desc:'User-centred design — scope the problem, segment users, generate solutions, pick the best.'},{num:'4',name:'Problem Solving & RCA',week:'Week 3',wc:'w3',desc:'Root cause analysis for metric drops. MECE, 5-Whys, funnel analysis under pressure.'},{num:'5',name:'PM Assignment Approach',week:'Week 4',wc:'w45',desc:'Breaking down take-home assignments — scoping, structuring, writing, presenting.'},{num:'6',name:'Resume Masterclass',week:'Week 4',wc:'w45',desc:'PM resume anatomy, framing non-PM experience, quantifying impact, ATS readiness.'},{num:'7',name:'1:1 Mock + Resume Review',week:'Wk 4 & 5',wc:'w45',desc:'1 hour per student with an instructor — full mock + resume line-by-line review.'}];return(<section id="topics"><div className="section-label">7 Topics</div><h2>Everything you need<br/><em>for APM Interviews</em></h2><FadeUp><div className="topics-list">{topics.map((t,i)=><div key={i} className="topic-row"><div className="topic-num">{t.num}</div><div><div className="topic-name">{t.name}</div><div className="topic-desc">{t.desc}</div></div><span className={`week-badge ${t.wc}`}>{t.week}</span></div>)}</div></FadeUp></section>);}
function Schedule(){const weeks=[{num:'01',tag:'PM Foundations',sat:{topic:'PM Cases & Guesstimates',detail:'How interviews are structured, guesstimation frameworks, types of PM rounds.',type:'live',label:'📖 Class'},sun:{topic:'Peer Guesstimate Mocks',detail:'Breakout groups. Each student runs a mock as interviewer and interviewee.',type:'mock',label:'🔁 Peer Mocks'}},{num:'02',tag:'Product Design',sat:{topic:'Product Design',detail:'User-centred framework — scope, segment, generate solutions. Live walkthroughs.',type:'live',label:'📖 Class'},sun:{topic:'Peer Product Design Mocks',detail:'Breakout practice. Give and receive structured feedback on answer quality.',type:'mock',label:'🔁 Peer Mocks'}},{num:'03',tag:'RCA',sat:{topic:'Problem Solving & RCA',detail:'Metric drops, funnel-based diagnosis, MECE thinking, 5-Whys under time pressure.',type:'live',label:'📖 Class'},sun:{topic:'Peer RCA Mocks',detail:'Real metric-drop scenarios. Students rotate between interviewer and candidate.',type:'mock',label:'🔁 Peer Mocks'}},{num:'04',tag:'Assignment + Resume',sat:{topic:'PM Assignment + Resume Masterclass',detail:'Take-home assignment approach + resume masterclass, PM framing & ATS.',type:'live',label:'📖 Class'},sun:{topic:'10 Students — 1:1 Mocks',detail:'Instructor A: 5 students · Instructor B: 5 students. 1 hour each.',type:'mock1',label:'🎯 1:1 Mock'}},{num:'05',tag:'Final Mocks',sat:{topic:'10 Students — 1:1 Mocks',detail:'Instructor A: 5 students · Instructor B: 5 students. 1 hour each.',type:'mock1',label:'🎯 1:1 Mock'},sun:{topic:'10 Students — 1:1 Mocks',detail:'Final batch. Every student gets their 1 hour. No exceptions.',type:'mock1',label:'🎯 1:1 Mock'}}];return(<section id="schedule"><div className="section-label">Course Schedule</div><h2>5 Weekends,<br/><em>Week by Week</em></h2><p className="section-intro"><strong>Saturdays are for classes.</strong> <strong>Sundays are for practice.</strong> Weeks 4 &amp; 5 Sundays are dedicated 1:1 mock slots with instructors.</p><FadeUp><div className="weeks-grid">{weeks.map((w,i)=><div key={i} className="week-row"><div className="week-label"><div className="wnum">{w.num}</div><div className="wtag">{w.tag}</div></div>{[w.sat,w.sun].map((day,j)=><div key={j} className="week-day"><div className="day-header"><span className="day-name">{j===0?'SATURDAY':'SUNDAY'}</span><span className={`day-format ${day.type}`}>{day.label}</span></div><div className="day-topic">{day.topic}</div><div className="day-detail">{day.detail}</div></div>)}</div>)}</div></FadeUp></section>);}
function Instructors(){return(<section><div className="section-label">Instructors</div><h2>2 Instructors.<br/><em>Real Experience.</em></h2><p className="section-intro">Two PMs who've been through the hiring process and know exactly what interviewers look for. Every student gets time with both.</p><FadeUp><div className="instructor-grid">{[{letter:'A',role:'Instructor A · Product Manager',desc:'Leads sessions on PM foundations, guesstimates, and product design. Conducts 15 of the 30 1:1 mock sessions. Brings direct hiring-side perspective.'},{letter:'B',role:'Instructor B · Product Manager',desc:'Leads sessions on RCA, PM assignments, and the resume masterclass. Conducts the remaining 15 1:1 mocks. Deep focus on structuring and written communication.'}].map((ins,i)=><div key={i} className="instructor-card"><div className="instructor-letter">{ins.letter}</div><div className="instructor-role">{ins.role}</div><p className="instructor-desc">{ins.desc}</p></div>)}</div></FadeUp></section>);}
function Pricing(){const includes=[{title:'PM Cases & Interview Formats',sub:'What PM interviews exist, how panels evaluate, how to structure answers from day one.'},{title:'Guesstimates',sub:'Estimation frameworks, thinking aloud, avoiding traps, structuring numbers confidently.'},{title:'Product Design',sub:'User-centred design — scope the problem, segment users, generate solutions, pick the best.'},{title:'Problem Solving & RCA',sub:'Root cause analysis for metric drops. MECE, 5-Whys, funnel analysis under pressure.'},{title:'PM Assignment Approach',sub:'Breaking down take-home assignments — scoping, structuring, writing, presenting.'},{title:'Resume Masterclass',sub:'PM resume anatomy, framing non-PM experience, quantifying impact, ATS readiness.'},{title:'1:1 Mock + Resume Review',sub:'1 hour per student with an instructor — full mock + resume line-by-line review.'}];return(<section id="pricing"><div className="section-label">Pricing</div><h2>One Price.<br/><em>Everything Included.</em></h2><p className="section-intro">₹5,999 per student. No upsells, no add-ons. The 1:1 mock and resume review are included for every single student.</p><FadeUp><div className="pricing-card"><div className="price-left"><div className="price-label">Cohort Fee</div><div className="price-amount">₹5,999</div><div className="price-per">Per student · One-time</div><div className="price-spots"><span className="dot"></span><span><strong>30 seats</strong> total · Limited cohort</span></div><a href="#enroll" className="btn-primary">Reserve Seat →</a></div><div className="price-right">{includes.map((item,i)=><div key={i} className="price-item"><span className="price-item-icon">✦</span><div className="price-item-text">{item.title}<span>{item.sub}</span></div></div>)}</div></div></FadeUp></section>);}
function CTA(){const[email,setEmail]=useState('');const[submitted,setSubmitted]=useState(false);const[error,setError]=useState(false);function submit(){if(!email||!email.includes('@')){setError(true);return;}setError(false);setSubmitted(true);}return(<section className="cta-section" id="enroll"><div className="cta-orb1"/><div className="cta-orb2"/><div className="cta-bg-word">PMF</div><FadeUp><h2>30 Seats.<br/><em style={{fontFamily:"'DM Serif Display',serif",fontStyle:'italic',color:'var(--gold)'}}>Don't Miss Yours.</em></h2><div className="cta-price">₹5,999 / student</div><p className="cta-sub">5 weeks. 7 topics. 1:1 mock with an instructor. Everything to crack your APM placement.</p><div className="cta-form"><input type="email" placeholder="your@email.com" value={email} onChange={e=>{setEmail(e.target.value);setError(false);}} disabled={submitted} style={{boxShadow:error?'inset 0 0 0 2px var(--coral)':'none'}}/><button onClick={submit} disabled={submitted}>{submitted?'✓ Seat Reserved!':'Reserve Seat →'}</button></div><p className="cta-note">5 Weeks · ₹5,999 All-inclusive</p></FadeUp></section>);}
function Footer(){return(<footer><div className="footer-logo">PM<span>F</span></div><div className="footer-copy">© 2026 PMF — Product. Manager. Fit.</div></footer>);}
function App(){return(<><Nav/><Hero/><Marquee/><WhatYouGet/><Topics/><Schedule/><Instructors/><Pricing/><CTA/><Footer/></>);}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
